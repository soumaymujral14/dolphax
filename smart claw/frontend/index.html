<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dolphax</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #1a1a1a; color: #e0e0e0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { margin-bottom: 20px; color: #ffd700; }
        .input-section { margin-bottom: 20px; display: flex; gap: 10px; }
        #userInput { flex: 1; padding: 10px; font-size: 16px; border-radius: 4px; border: 1px solid #444; background: #2a2a2a; color: #e0e0e0; }
        #sendBtn { padding: 10px 20px; background: #ffd700; color: #000; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        #sendBtn:hover { background: #ffed4e; }
        #sendBtn:disabled { background: #666; cursor: not-allowed; }
        .messages { margin-top: 20px; }
        .message { margin-bottom: 15px; padding: 15px; border-radius: 4px; }
        .user-msg { background: #2a5a2a; margin-left: 40px; }
        .ai-msg { background: #2a3a5a; margin-right: 40px; }
        .ai-msg strong { color: #ffd700; }
        .category { color: #88ccff; font-size: 12px; margin-top: 8px; }
        .model { color: #88ff88; font-size: 12px; margin-top: 4px; }
        .error { color: #ff6b6b; }
        .loading { color: #ffd700; font-style: italic; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐬 Dolphax</h1>
        
        <div class="input-section">
            <textarea id="userInput" placeholder="Ask me anything..." rows="3"></textarea>
            <button id="sendBtn">Send</button>
        </div>

        <div id="messages" class="messages"></div>
    </div>

    <script>
        const API_URL = "http://127.0.0.1:8000";
        const userInput = document.getElementById("userInput");
        const sendBtn = document.getElementById("sendBtn");
        const messagesDiv = document.getElementById("messages");

        sendBtn.addEventListener("click", sendMessage);
        userInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter" && e.ctrlKey) {
                sendMessage();
            }
        });

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // Disable input during request
            sendBtn.disabled = true;
            userInput.disabled = true;

            // Display user message
            const userMsgDiv = document.createElement("div");
            userMsgDiv.className = "message user-msg";
            userMsgDiv.textContent = text;
            messagesDiv.appendChild(userMsgDiv);

            // Clear input
            userInput.value = "";

            // Display loading indicator
            const loadingDiv = document.createElement("div");
            loadingDiv.className = "message ai-msg loading";
            loadingDiv.textContent = "Thinking...";
            messagesDiv.appendChild(loadingDiv);

            try {
                const response = await fetch(`${API_URL}/query`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ prompt: text, user_selected_category: "auto" })
                });

                if (!response.ok) {
                    throw new Error(`Backend error: ${response.status}`);
                }

                const data = await response.json();
                loadingDiv.remove();

                // Display AI response
                const aiMsgDiv = document.createElement("div");
                aiMsgDiv.className = "message ai-msg";
                
                let responseHtml = `<strong>Response:</strong><p>${escapeHtml(data.output)}</p>`;
                
                if (data.final_category_used) {
                    responseHtml += `<div class="category">📁 Category: ${data.final_category_used}</div>`;
                }
                
                if (data.model_used) {
                    responseHtml += `<div class="model">⚙️ Model: ${data.model_used}</div>`;
                }
                
                if (data.confidence) {
                    responseHtml += `<div class="model">✓ Confidence: ${(data.confidence * 100).toFixed(0)}%</div>`;
                }
                
                aiMsgDiv.innerHTML = responseHtml;
                messagesDiv.appendChild(aiMsgDiv);

            } catch (error) {
                loadingDiv.remove();
                const errorDiv = document.createElement("div");
                errorDiv.className = "message ai-msg error";
                errorDiv.textContent = `Error: ${error.message}. Make sure the backend is running at ${API_URL}`;
                messagesDiv.appendChild(errorDiv);
            }

            // Re-enable input
            sendBtn.disabled = false;
            userInput.disabled = false;
            userInput.focus();

            // Scroll to bottom
            messagesDiv.parentElement.scrollTop = messagesDiv.parentElement.scrollHeight;
        }

        function escapeHtml(text) {
            const map = {
                "&": "&amp;",
                "<": "&lt;",
                ">": "&gt;",
                '"': "&quot;",
                "'": "&#039;"
            };
            return text.replace(/[&<>"']/g, (m) => map[m]);
        }

        // Focus input on load
        userInput.focus();
    </script>
</body>
</html>
